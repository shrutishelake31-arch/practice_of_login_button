<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Practice</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:20px 50px;

            background:white;

            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:blueviolet;
        }

        .navbar{
            display:flex;
            gap:25px;
        }

        .navbar a{
            text-decoration:none;
            color:black;
            font-size:18px;

            transition:0.3s;
        }

        .navbar a:hover{
            color:blueviolet;
        }

        .hire-btn{
            padding:10px 20px;

            border:none;

            border-radius:25px;

            background:blueviolet;

            color:white;

            cursor:pointer;

            transition:0.3s;
        }

        .hire-btn:hover{
            transform:scale(1.05);

            box-shadow:0 0 15px blueviolet;
        }

    </style>
</head>

<body>

    <div class="header">

        <div class="logo">
            Shruti
        </div>

        <div class="navbar">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </div>

        <button class="hire-btn">
            Hire Me
        </button>

    </div>

</body>
</html>
