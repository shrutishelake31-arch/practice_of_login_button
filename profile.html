<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Dashboard</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    background-color: #e6d8f3;
    padding: 20px;
    font-family: Arial, sans-serif;
}

/* Navbar */

.navbar{
    background: linear-gradient(to right, #8a2be2, #6a0dad);
    color: white;
    border-radius: 25px;
    padding: 40px;
    text-align: center;
}

.navbar h1{
    margin-bottom: 15px;
}

.navbar h3{
    margin-bottom: 15px;
}

/* Skills Section */

.skills{
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    margin-top: 25px;
}

.box{
    width: 48%;
    height: 150px;
    background-color: white;
    border-radius: 25px;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 30px;
    font-weight: bold;

    box-shadow: 0px 5px 15px rgba(0,0,0,0.1);

    transition: 0.3s;
}

.box:hover{
    transform: translateY(-5px);
}

/* Streak Card */

.navbar2{
    background: linear-gradient(to right,#b073e8,#a05fe0);
    border-radius: 25px;
    margin-top: 30px;
    height: 120px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
}

.navbar2 h3{
    margin-bottom: 10px;
}

/* Button */

.button{
    width: 220px;
    height: 55px;
    background-color: #5c3d99;
    color: white;

    border: none;
    border-radius: 20px;

    display: flex;
    justify-content: center;
    align-items: center;

    margin: 30px auto;

    font-size: 18px;
    font-weight: bold;
    cursor: pointer;

    transition: 0.3s;
}

.button:hover{
    background-color: #4a2f82;
}
</style>
</head>

<body>

<div class="navbar">
    <h1>Welcome Shruti 👋</h1>
    <h3>CSE Student</h3>
    <p>Keep Learning, Keep Growing! 🚀</p>
</div>

<div class="skills">

    <div class="box">
        HTML ✅
    </div>

    <div class="box">
        CSS ✅
    </div>

    <div class="box">
        JavaScript ⬜
    </div>

    <div class="box">
        DSA ⬜
    </div>

</div>

<div class="navbar2">
    <h3>Current Streak 🔥</h3>
    <p>5 Days</p>
</div>

<button class="button">
    View Progress
</button>

</body>
</html>
