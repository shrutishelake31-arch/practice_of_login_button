<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: #050816;
        }

        .box {

            width: 400px;

            background: rgba(255, 255, 255, 0.05);

            backdrop-filter: blur(10px);

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0 0 25px rgba(145, 94, 255, 0.5);

            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        label {
            color: white;
            margin-bottom: 8px;
        }

        input {

            width: 100%;

            height: 45px;

            margin-bottom: 20px;

            border: none;

            border-radius: 10px;

            padding-left: 15px;

            font-size: 16px;
        }

        button {

            height: 45px;

            border: none;

            border-radius: 10px;

            background: #915EFF;

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            transform: translateY(-3px);

            box-shadow: 0 0 20px #915EFF;
        }

        .forgot {

            text-align: right;

            margin-bottom: 20px;
        }

        .forgot a:hover {
            color: #915EFF;
            text-decoration: none;
        }

        .signup a {
            color: #915EFF;
            text-decoration: none;
            transition: 0.3s;
        }

        .signup a:hover {
            color: white;
            text-shadow: 0 0 10px #915EFF;
        }
    </style>

</head>

<body>

    <div class="box">

        <h1>Welcome Back </h1>

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" placeholder="Enter your password">

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>


        <button>Login</button>
        <br><br>
        <div class="Sign Up">
            <a href="#">Don't have an account? Sign Up</a>
        </div>

    </div>

</body>

</html>
